spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

hps:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long!!
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  supported-languages:
    - en
    - pl
    - uk
  default-language: en
